<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Victor Guerin</title>
    <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../css/styles.css">
</head>
<body>

    <header>
        <div class="logo">
            <a href="/fr/">VICTOR GUERIN</a>
        </div>
        <nav>
            <ul>
                <li><a href="/fr/a-propos/">À propos</a></li>
                <li><a href="/fr/loudspeaker/">Loud Speaker</a></li>
                <li><a href="/fr/oeuvres/">Œuvres choisies</a></li>
                <li><a href="/fr/expositions/">Expositions</a></li>
                <li><a href="/fr/cv/">CV</a></li>
                <li><a href="/fr/contact/">Contact</a></li>
                <li class="lang-item">
                    <a href="/contact/" class="lang-switch" aria-label="View the English version">
                        <img src="../../images/UK.png" alt="English" class="lang-flag">
                    </a>
                </li>
            </ul>
        </nav>
    </header>

    <div class="container">
        <h2 class="section-title">Contact</h2>
        
        <div class="row">
            <div class="year">Demandes</div>
            <div class="description">&nbsp;&nbsp;<a href="mailto:enquiries@victorguerin.com">enquiries@victorguerin.com</a></div>
        </div>
        <div class="row">
            <div class="year">Presse</div>
            <div class="description">&nbsp;&nbsp;<a href="mailto:press@victorguerin.com">press@victorguerin.com</a></div>
        </div>
        <br>
        <div class="row">
            <div class="year">Instagram</div>
            <div class="description">&nbsp;&nbsp;<a href="https://www.instagram.com/victorguerin.fr" target="_blank">@victorguerin.fr</a></div>
        </div>
        <div class="row">
            <div class="year">LinkedIn</div>
            <div class="description">&nbsp;&nbsp;<a href="https://www.linkedin.com/in/guerinvictor/" target="_blank">in/guerinvictor</a></div>
        </div>
        <br><br><br><br>
        
        <form id="newsletter-form" action="https://formspree.io/f/xgvewaey" method="POST">
            <input type="text" name="name" placeholder="Votre prénom" required>
            <input type="text" name="surname" placeholder="Votre nom" required>
            <input type="email" name="email" placeholder="Votre e-mail" required>
            <button type="submit">S’inscrire à la newsletter</button>
        </form>
    </div>
        
    <script>
        document.getElementById("newsletter-form").addEventListener("submit", function(event) {
            event.preventDefault();

            let form = this;
            let formData = new FormData(form);

            fetch(form.action, {
                method: form.method,
                body: formData,
                headers: { 'Accept': 'application/json' }
            }).then(response => {
                if (response.ok) {
                    window.location.href = "https://victorguerin.com/fr/";
                } else {
                    alert("Un problème est survenu lors de l’envoi du formulaire. Veuillez réessayer.");
                }
            }).catch(error => {
                console.error("Error:", error);
                alert("Une erreur s’est produite. Veuillez vérifier votre connexion.");
            });
        });
    </script>

    <footer>
        <p>&copy; 2026 Victor Guerin. Tous droits réservés.</p>
    </footer>
</body>
</html>
