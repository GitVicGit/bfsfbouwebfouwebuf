<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accueil | Victor Guerin</title>
    <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/styles.css">
    <style>
        .slideshow-container {
            position: relative;
            width: 100%;
            aspect-ratio: 16 / 9;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .slide {
            position: absolute;
            inset: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: opacity 1s ease-in-out;
        }

        .slide img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
        }

        .slide.active {
            opacity: 1;
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">
            <a href="/fr/">VICTOR GUERIN</a>
        </div>
        <nav>
            <ul>
                <li><a href="/fr/a-propos/">À propos</a></li>
                <li><a href="/fr/loudspeaker/">Loud Speaker</a></li>
                <li><a href="/fr/oeuvres/">Œuvres</a></li>
                <li><a href="/fr/expositions/">Expositions</a></li>
                <li><a href="/fr/cv/">CV</a></li>
                <li><a href="/fr/contact/">Contact</a></li>
                <li class="lang-item">
                    <a href="/" class="lang-switch" aria-label="View the English version">
                        <img src="/images/UK.png" alt="English" class="lang-flag">
                    </a>
                </li>
            </ul>
        </nav>
    </header>

    <section id="home">
        <div class="container">
            <div class="slideshow-container">
                <div class="image-container slide active">
                    <img src="/images/d_liminal_16-9.jpg" alt="Liminal">
                </div>
                <div class="image-container slide">
                    <img src="/images/d_cracks_of_potential_16-9.jpg" alt="Cracks of Potential">
                </div>
                <div class="image-container slide">
                    <img src="/images/d_loud_speaker_16-9.jpg" alt="Loud Speaker">
                </div>
                <div class="image-container slide">
                    <img src="/images/d_sustenance_16-9.jpg" alt="Sustenance">
                </div>
                <div class="image-container slide">
                    <img src="/images/d_echoes_of_extraction_16-9.jpg" alt="Echoes of Extraction">
                </div>
                <div class="image-container slide">
                    <img src="/images/d_natures_chromatic_symphony_16-9.jpg" alt="Nature's Chromatic Symphony">
                </div>
            </div>
        </div>
    </section>

    <br>
    <footer>
        <p>&copy; 2026 Victor Guerin. Tous droits réservés.</p>
    </footer>

    <script>
        let slideIndex = 0;
        const slides = document.querySelectorAll(".slide");

        function showSlides() {
            slides.forEach((slide) => {
                slide.classList.remove("active");
            });

            slideIndex++;
            if (slideIndex >= slides.length) {
                slideIndex = 0;
            }

            slides[slideIndex].classList.add("active");
            setTimeout(showSlides, 8000);
        }

        setTimeout(showSlides, 8000);
    </script>
</body>
</html>
