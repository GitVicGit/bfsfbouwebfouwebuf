<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accueil | Victor Guerin</title>
    <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/styles.css">
    <style>
        .slideshow-wrapper {
            width: 100%;
        }

        .slideshow-container {
            position: relative;
            width: 100%;
            aspect-ratio: 16 / 9;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .slide {
            position: absolute;
            inset: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: opacity 1s ease-in-out;
        }

        .slide.active {
            opacity: 1;
        }

        .slide img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
        }

        .slideshow-meta {
            display: grid;
            grid-template-columns: auto 1fr;
            align-items: start;
            column-gap: 10px;
            margin-top: 12px;
        }

        .slideshow-controls {
            display: flex;
            align-items: center;
            gap: 14px;
            line-height: 1;
            white-space: nowrap;
        }

        .slide-nav {
            background: none;
            border: none;
            padding: 0;
            font-family: 'Raleway', sans-serif;
            font-size: 18px;
            font-weight: 400;
            cursor: pointer;
            color: #777;
            line-height: 1;
        }

        .slide-nav:hover {
            opacity: 0.7;
        }

        .slide-caption {
            font-family: 'Raleway', sans-serif;
            font-size: 14px;
            font-weight: 400;
            color: #777;
            line-height: 1.4;
            text-align: left;
            min-width: 0;
        }

        @media (max-width: 768px) {
            .slide-caption {
                min-height: 2.8em;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">
            <a href="/fr/">VICTOR GUERIN</a>
        </div>
        <nav>
            <ul>
                <li><a href="/fr/a-propos/">À propos</a></li>
                <li><a href="/fr/loudspeaker/">Loud Speaker</a></li>
                <li><a href="/fr/oeuvres/">Œuvres</a></li>
                <li><a href="/fr/expositions/">Expositions</a></li>
                <li><a href="/fr/cv/">CV</a></li>
                <li><a href="/fr/contact/">Contact</a></li>
                <li class="lang-item">
                    <a href="/" class="lang-switch" aria-label="View the English version">
                        <img src="/images/UK.png" alt="English" class="lang-flag">
                    </a>
                </li>
            </ul>
        </nav>
    </header>

    <section id="home">
        <div class="container">
            <div class="slideshow-wrapper">
                <div class="slideshow-container">
                    <div class="image-container slide active">
                        <img src="/images/d_liminal_16-9.jpg" alt="Liminal">
                    </div>
                    <div class="image-container slide">
                        <img src="/images/d_cracks_of_potential_16-9.jpg" alt="Cracks of Potential">
                    </div>
                    <div class="image-container slide">
                        <img src="/images/d_loud_speaker_16-9.jpg" alt="Loud Speaker">
                    </div>
                    <div class="image-container slide">
                        <img src="/images/d_sustenance_16-9.jpg" alt="Sustenance">
                    </div>
                    <div class="image-container slide">
                        <img src="/images/d_echoes_of_extraction_16-9.jpg" alt="Echoes of Extraction">
                    </div>
                    <div class="image-container slide">
                        <img src="/images/d_natures_chromatic_symphony_16-9.jpg" alt="Nature's Chromatic Symphony">
                    </div>
                </div>

                <div class="slideshow-meta">
                    <div class="slideshow-controls">
                        <button class="slide-nav prev" aria-label="Image précédente">&lt;</button>
                        <button class="slide-nav next" aria-label="Image suivante">&gt;</button>
                    </div>
                    <div class="slide-caption" id="slide-caption">
                        Liminal (2025), résidence à Neumünster Abbey, Luxembourg (LU)
                    </div>
                </div>
            </div>
        </div>
    </section>

    <footer>
        <p>&copy; 2026 Victor Guerin. Tous droits réservés.</p>
    </footer>

    <script>
        let slideIndex = 0;
        const slides = document.querySelectorAll(".slide");
        const caption = document.getElementById("slide-caption");
        const prevButton = document.querySelector(".prev");
        const nextButton = document.querySelector(".next");

        const captions = [
            "Liminal (2025), résidence à Neumünster Abbey, Luxembourg (LU)",
            "Cracks of Potential (2025), résidence à Neumünster Abbey, Luxembourg (LU)",
            "Loud Speaker (2026), commission d'ArtHouse Jersey, Jersey (C.I.)",
            "Sustenance (2025), The Handbag Factory, Londres (GB)",
            "Echoes of Extraction (2024), Royal College of Art, Londres (GB)",
            "Nature's Chromatic Symphony (2023), résidence sur Site Archéologique d'Hangzhou, Hangzhou (CN)"
        ];

        let slideshowTimer;

        function updateSlide(index) {
            slides.forEach((slide) => {
                slide.classList.remove("active");
            });

            slides[index].classList.add("active");
            caption.textContent = captions[index];
        }

        function showNextSlide() {
            slideIndex++;
            if (slideIndex >= slides.length) {
                slideIndex = 0;
            }
            updateSlide(slideIndex);
        }

        function showPrevSlide() {
            slideIndex--;
            if (slideIndex < 0) {
                slideIndex = slides.length - 1;
            }
            updateSlide(slideIndex);
        }

        function startSlideshow() {
            clearInterval(slideshowTimer);
            slideshowTimer = setInterval(showNextSlide, 8000);
        }

        prevButton.addEventListener("click", function () {
            showPrevSlide();
            startSlideshow();
        });

        nextButton.addEventListener("click", function () {
            showNextSlide();
            startSlideshow();
        });

        updateSlide(slideIndex);
        startSlideshow();
    </script>
</body>
</html>
